image: python:3.10

stages:
  - lint
  - test
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/
    - .venv/

before_script:
  - python -V
  - pip install --upgrade pip wheel
  - pip install -e .[dev]

lint:ruff:
  stage: lint
  script:
    - ruff check .
    - ruff format --check .

test:pytest:
  stage: test
  script:
    - pytest tests/

security:audit:
  stage: security
  script:
    - pip-audit --desc on
